<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Ads Настройка</title>

<style>
body {font-family: Arial; margin:0;}
header {background:#2563eb;color:#fff;padding:15px;display:flex;justify-content:space-between;}
.btn {background:#10b981;color:#fff;padding:10px 20px;text-decoration:none;border-radius:5px;}
.hero {padding:60px;text-align:center;background:#f3f4f6;}
section {padding:40px;}
form {max-width:400px;margin:auto;}
input, textarea {width:100%;padding:10px;margin:10px 0;}
button {background:#10b981;color:#fff;padding:10px;border:none;width:100%;}
</style>
</head>

<body>

<header>
<div>Google Ads Pro</div>
<a href="#contact" class="btn">Получить аудит</a>
</header>

<div class="hero">
<h1>Настройка Google Ads под ключ</h1>
<p>Привожу клиентов, снижаю цену лида, настраиваю аналитику</p>
<a href="#contact" class="btn">Получить бесплатный аудит</a>
</div>

<section>
<h2>Что вы получите</h2>
<ul>
<li>Настройка Google Ads</li>
<li>Google Tag Manager</li>
<li>GA4 аналитика</li>
<li>Отслеживание заявок</li>
</ul>
</section>

<section id="contact">
<h2>Оставьте заявку</h2>

<form action="https://formspree.io/f/ВАШ_ID" method="POST">
<input type="text" name="name" placeholder="Ваше имя" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Сообщение"></textarea>
<button type="submit">Отправить</button>
</form>

</section>

</body>
</html>
